# Merge strategy when this config is included. Possibilities: ignore, override, merge, mergeReverse
priority: merge

# One path is chosen at random. Use none to include nothing
# include: path1.conf path2.conf path3.conf none

# Set the random number generator seed
# seed: 26061962

# Set the FFMPEG executable path
# ffmpeg_path: "ffmpeg"

# Output video file name. %d will be replaced by current date and %h by current hour
video_out: "out/%d_%h"

# Width and height of the final video, in pixels
# video_dims: 1080 1920

# Width and height of the final video, in pixels
video_width: 1080
video_height: 1920

# Target video framerate in Hz (FPS)
video_framerate: 25

# Filter for the whole video. Possibilities are none, grayscale, pixelize16, pixelize32, pixelize64, pixelize128, pixelize256, pixelize512, pixelize16grayscale, pixelize32grayscale, pixelize64grayscale, pixelize128grayscale, pixelize256grayscale, pixelize512grayscale, sepia, invert, warm, cool, blur, blurstrong, blursubtle, blurgrayscale, blurstronggrayscale, blursubtlegrayscale, sharp, sharpgrayscale, edge, edgeinvert, posterize, posterizestrong, posterizegrayscale, posterizestronggrayscale, glitch, noise, noisecolor, vibrant and vhs
video_filter: pixelize128

# Transition for video start, and its duration (single number or random range)
# in_transition: black 1.0 3.0

# Transition for video start. Possibilities are none, black and white
in_transition_effect: black

# Transition duration for video start (single number or random range)
# in_transition_dur: 1.0 3.0

# Transition duration for video start
in_transition_dur_min: 1.0
in_transition_dur_max: 3.0

# Transition for video end, and its duration (single number or random range)
# out_transition: black 1.0 3.0

# Transition for video end. Possibilities are none, black, and white
out_transition_effect: black

# Transition duration for video end (single number or random range)
# in_transition_dur: 1.0 3.0

# Transition duration for video end
out_transition_dur_min: 1.0
out_transition_dur_max: 3.0

# Number of slides (single number or random range)
# slide_count: 9

# Number of slides
slide_count_min: 8
slide_count_max: 12

# Color all the slides will be filled with to achieve the desired dimensions. Possibilities are black, white or a #RRGGBB hex color
slide_fill_color: black

# Default slide duration in seconds (single number or random range)
# def_slide_dur: 1.0 1.5

# Default slide duration in seconds
def_slide_dur_min: 1.0
def_slide_dur_max: 1.5

# Specific slide duration (single number or random range). First number is slide number (1st slide is slide 1)
# slide_dur 1 2.0 3.0

# Specific slide duration. First number is slide number (1st slide is slide 1)
slide_dur_min: 1 2.0
slide_dur_max: 1 3.0

# Default slide transition, and its duration (single number or random range)
# def_slide_transition: white 0.5 1.0

# Default slide transition. Possibilities are none, fade, black, white, slidedown, slideup, slideleft, slideright, sliderandom, wipedown, wipeup, wipeleft, wiperight, wiperandom, zoomin, zoomout, distance and burn
def_slide_transition_effect: white

# Default slide transition duration (single number or random range)
# def_slide_transition_dur: 0.5 1.0

# Default slide transition duration
def_slide_transition_dur_min: 0.5
def_slide_transition_dur_max: 1.0

# Specific slide transition, and its duration (single number or random range). First number is slide number (1st slide is slide 1)
# slide_transition 1 fade 0.8 1.6

# Specific slide transition. First number is slide number (1st slide is slide 1). Possibilities are none, fade, black, white, slidedown, slideup, slideleft, slideright, sliderandom, wipedown, wipeup, wipeleft, wiperight, wiperandom, zoomin, zoomout, distance and burn
slide_transition_effect: 1 fade

# Specific slide transition duration (single number or random range). First number is slide number (1st slide is slide 1)
# slide_transition_dur: 1 0.8 1.6

# Specific slide transition duration. First number is slide number (1st slide is slide 1)
slide_transition_dur_min: 1 0.8
slide_transition_dur_max: 1 1.6

# Set the default slide filter. Possibilities are none, grayscale, pixelize16, pixelize32, pixelize64, pixelize128, pixelize256, pixelize512, pixelize16grayscale, pixelize32grayscale, pixelize64grayscale, pixelize128grayscale, pixelize256grayscale, pixelize512grayscale, sepia, invert, warm, cool, blur, blurstrong, blursubtle, blurgrayscale, blurstronggrayscale, blursubtlegrayscale, sharp, sharpgrayscale, edge, edgeinvert, posterize, posterizestrong, posterizegrayscale, posterizestronggrayscale, glitch, noise, noisecolor, vibrant and vhs
def_slide_filter: grayscale

# Set the slide filter for a specific slide. First number is slide number (1st slide is slide 1). Possibilities are none, grayscale, pixelize16, pixelize32, pixelize64, pixelize128, pixelize256, pixelize512, pixelize16grayscale, pixelize32grayscale, pixelize64grayscale, pixelize128grayscale, pixelize256grayscale, pixelize512grayscale, sepia, invert, warm, cool, blur, blurstrong, blursubtle, blurgrayscale, blurstronggrayscale, blursubtlegrayscale, sharp, sharpgrayscale, edge, edgeinvert, posterize, posterizestrong, posterizegrayscale, posterizestronggrayscale, glitch, noise, noisecolor, vibrant and vhs
slide_filter: 1 pixelize256

# Set the default slide scaling mode. Possibilities are neighbor, bilinear, area, bicubic, bicublin, sinc, spline, lanczos, fastbilinear and gauss
def_slide_scaling: bilinear

# Set the slide scaling mode for a specific slide. First number is slide number (1st slide is slide 1). Possibilities are neighbor, bilinear, area, bicubic, bicublin, sinc, spline, lanczos, fastbilinear and gauss
slide_scaling: 1 neighbor

# Set the image for a specific slide. First number is slide number (1st slide is slide 1)
slide_image: 1 "intro.png"

# Set the selection mode. Possibilities are random, unique and order
image_selection_mode: random

# Add possible images for slides to pool
image_pool: "a.jpg" "b.png" "c.gif"

# Folder where images will be added to pool. More than one image_folder option can be specified (additive)
image_folder: "pictures"
image_folder: "pictures2"

# Add possible audios for the video to the pool
audio_pool: "a.mp3" "b.wav" "c.ogg"

# Folder where audios will be added to pool. More than one audio_folder option can be specified (additive)
audio_folder: "audio"
audio_folder: "audio2"

# Audio filter. Possibilities are none, bassboost, tremble, echo, reverb, softclip, bitcrush, radio, vhs, vinyl, underwater, dreamy and lowquality
audio_filter: reverb
